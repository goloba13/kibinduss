<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}KIBINDU SS{% endblock %}</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- dropper -->
    
    <style>
    /* ===== STYLE ZOTE ZA DASHBOARD (zilizopo) ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f4f6f9;
            height: 100vh;
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Main Sidebar - style kama NECTA PREMS */
        .main-sidebar {
            width: 220px;
            background: #15332b;
            color: #f1edf7;
            display: flex;
            flex-direction: column;
            transition: width 0.3s ease;
            box-shadow: 2px 0 10px rgba(251, 250, 250, 0.874);
        }

        .main-sidebar.sidebar-mini {
            width: 52px;
        }

        .brand-link {
            display: flex;
            align-items: center;
            padding: 0.3rem;
            border-bottom: 4px solid rgba(255, 255, 255, 0);
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            white-space: nowrap;
        }

        .brand-image {
            min-width: 40px;
            width: 40px;
            height: 40px;
            margin-right: 10px;
            background: #2ecc71;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .main-sidebar.sidebar-mini .brand-text {
            display: none;
        }

        .main-sidebar.sidebar-mini .brand-image {
            margin-right: 0;
        }

        .sidebar {
            flex: 1;
            overflow-y: auto;
            padding: 1rem 0;
        }

        .nav-sidebar {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 2px;
            position: relative;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 0.75rem 1.25rem;
            color: rgba(251, 250, 252, 0.7);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            white-space: nowrap;
        }

        .nav-link:hover,
        .nav-link.active {
            background: rgba(255,255,255,0.1);
            border-left-color: #2ecc71;
            color: rgb(254, 252, 252);
        }

        .nav-link i {
            min-width: 30px;
            font-size: 1.2rem;
            text-align: center;
        }

        .nav-link p {
            flex: 1;
            margin: 0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .right {
            margin-left: auto;
        }

    .nav-treeview {
    list-style: none;
    padding-left: 2.5rem;
    overflow: hidden;
    max-height: 0;
    transition: max-height 1s ease-out;
}

.menu-open > .nav-treeview {
    max-height: 500px; /* Inatosha kwa submenu yoyote, unaweza kuongeza ikiwa kuna vitu vingi */
}

        .menu-open > .nav-treeview {
            display: block;
        }

        .nav-treeview .nav-link {
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
        }

        /* Sidebar iliyokunjwa */
        .main-sidebar.sidebar-mini .nav-link p {
            display: none;
        }

        .main-sidebar.sidebar-mini .nav-treeview {
            display: none !important;
        }

        .main-sidebar.sidebar-mini .nav-link {
            justify-content: center;
            padding: 0.75rem 0;
        }

        .main-sidebar.sidebar-mini .nav-link i {
            margin: 0;
        }

        /* Content Wrapper */
        .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: #f4f6f9;
        }

        /* Navbar */
        .main-header {
            background: #28a745;
            box-shadow: 0 2px 5px rgba(14, 14, 14, 0.628);
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .navbar-nav {
            display: flex;
            align-items: center;
            list-style: none;
            gap: 1rem;
        }

        .navbar-nav .nav-link {
            color: white;
            text-decoration: none;
        }

        .badge {
            background: #f39c12;
            color: white;
            border-radius: 50%;
            padding: 0.11rem 0.4rem;
            font-size: 0.7rem;
            margin-left: -0.8rem;
        }

        /* Main Content */
        .content {
            padding: 20px;
            flex: 1;
            overflow-y: auto;
        }

        /* Footer */
        .main-footer {
            background: rgb(43, 102, 68);
            padding: 1rem 2rem;
            border-top: 1px solid #dee2e6;
            text-align: center;
            width: 100%;
        }

        /* Overlay kwa simu */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 999;
        }
        .sidebar-overlay.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-sidebar {
                position: fixed;
                z-index: 1000;
                height: 100vh;
                transform: translateX(0);
                transition: transform 0.3s ease;
            }
            .main-sidebar.sidebar-mini {
                transform: translateX(-100%);
            }
            .content-wrapper {
                width: 100%;
            }
        }
        /* Content Header */
        .content-header {
            padding: 1.5rem 2rem 0.5rem;
        }
/* User dropdown styling */
.nav-item.dropdown .dropdown-toggle {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}
.nav-item.dropdown .dropdown-toggle::after {
    display: inline-block;
    margin-left: 0.3rem;
    vertical-align: middle;
    content: "";
    border-top: 0.3em solid;
    border-right: 0.3em solid transparent;
    border-bottom: 0;
    border-left: 0.3em solid transparent;
}
.dropdown-menu {
    border-radius: 8px;
    box-shadow: 0 8px 20px rgba(27, 27, 27, 0.406);
    border: none;
    margin-top: 0.5rem;
    background-color: #28a745;
    list-style: none;
}
.dropdown-item i {
    width: 1.65rem;
    text-align: center;
    margin-right: 0.5rem;
}
.dropdown-item-text {
    font-weight: 500;
}
.dropdown-menu {
    display: none !important;
}
.dropdown-menu.show {
    display: block !important;
}
.dropdown-menu li {
    list-style: none;
}
.dropdown-item {
    text-decoration: none !important;
}
.dropdown-item:hover,
.dropdown-item:focus {
    text-decoration: none;
}

    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="wrapper">
        <!-- Overlay kwa simu -->
        <div class="sidebar-overlay" id="sidebarOverlay"></div>

        <!-- Sidebar partial -->
        {% include 'partials/sidebar2.html' %}

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <!-- Navbar partial -->
            {% include 'partials/navbar.html' %}

            <!-- Main Content -->
            <div class="content" id="main-content">
                {% block content %}
                <!-- Maudhui ya kila ukurasa yataingia hapa -->
                {% endblock %}
            </div>

            <!-- Footer partial -->
            {% include 'partials/footer.html' %}
        </div>
    </div>

    <!-- JavaScript za sidebar toggle na submenu -->
     
    <script>
        (function() {
            const sidebar = document.getElementById('sidebar');
            const pushBtn = document.getElementById('pushmenuBtn');
            const overlay = document.getElementById('sidebarOverlay');
            if (!sidebar) return;

            function setSidebarState(collapsed) {
                if (collapsed) {
                    sidebar.classList.add('sidebar-mini');
                } else {
                    sidebar.classList.remove('sidebar-mini');
                }
                if (window.innerWidth <= 768) {
                    if (collapsed) {
                        overlay?.classList.remove('active');
                    } else {
                        overlay?.classList.add('active');
                    }
                } else {
                    overlay?.classList.remove('active');
                }
                localStorage.setItem('sidebarCollapsed', collapsed);
            }

            const savedState = localStorage.getItem('sidebarCollapsed');
            setSidebarState(savedState === 'true' ? true : false);

            if (pushBtn) {
                pushBtn.addEventListener('click', function(e) {
                    e.preventDefault();
                    const isCollapsed = sidebar.classList.contains('sidebar-mini');
                    setSidebarState(!isCollapsed);
                });
            }
            if (overlay) {
                overlay.addEventListener('click', function() {
                    setSidebarState(true);
                });
            }
            window.addEventListener('resize', function() {
                const isCollapsed = sidebar.classList.contains('sidebar-mini');
                if (window.innerWidth <= 768) {
                    if (!isCollapsed) {
                        overlay?.classList.add('active');
                    } else {
                        overlay?.classList.remove('active');
                    }
                } else {
                    overlay?.classList.remove('active');
                }
            });

            // Fungua submenu kwa kubofya menu kuu
            document.querySelectorAll('.nav-sidebar > .nav-item > .nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const parent = this.parentElement;
                    if (parent.classList.contains('menu-open')) {
                        parent.classList.remove('menu-open');
                    } else {
                        document.querySelectorAll('.nav-sidebar > .nav-item.menu-open').forEach(el => {
                            if (el !== parent) el.classList.remove('menu-open');
                        });
                        parent.classList.add('menu-open');
                    }
                });
            });
        })();
        
    </script>
    {% block extra_js %}{% endblock %}
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>   

</body>
</html>
