<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Sitting Plan</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: white; }
        .plan-container { max-width: 100%; margin: 0 auto; background: #fff9f0; padding: 0.5rem; }
        .plan-heading { text-align: center; margin-bottom: 1rem; border-bottom: 1px dashed #c0a86a; padding-bottom: 0.5rem; }
        .heading-line1 { font-size: 1.2rem; font-weight: bold; color: #1e4a3d; }
        .heading-line2 { font-size: 0.9rem; color: #2c6e5c; }
        .heading-line3 { display: flex; justify-content: center; gap: 0.8rem; margin-top: 0.3rem; flex-wrap: wrap; font-size: 0.8rem; }
        .plan-frame { border: 3px solid #1e4a3d; border-radius: 16px; padding: 0.6rem; position: relative; background: #fff9f0; width: 100%; }

        /* Weka invigilator katikati kwa block margin auto */
        .invigilator {
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            background: #d9e7e2;
            border: 2px solid #1e4a3d;
            border-radius: 12px;
            padding: 0.3rem 1rem;
            font-weight: bold;
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }
        .desk-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 8px 12px;
            table-layout: fixed;
        }
        .desk-table td {
            border: 2px solid #c0a86a;
            background: #fef9e6;
            border-radius: 6px;
            text-align: center;
            padding: 8px 2px;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .desk-table td.empty { background: #fef9e6; border-color: #c0a86a; }
        .door-marker { position: absolute; font-size: 1.3rem; background: #fff9f0; border-radius: 30px; padding: 0 5px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .door-top-left { top: 12px; left: -10px; }
        .door-top-right { top: 12px; right: -10px; }
        .door-bottom-left { bottom: -10px; left: -10px; }
        .door-bottom-right { bottom: -10px; right: -10px; }
        .door-marker span { font-size: 0.65rem; margin-left: 2px; }
        .signature-section { margin-top: 20px; page-break-inside: avoid; break-inside: avoid; }
        .signature-row { display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 0.4rem; }
        .signature-label { font-size: 0.75rem; white-space: nowrap; }
        .signature-line1, .signature-line2, .signature-line3 { border-bottom: 1px solid #000; display: inline-block; }
        .signature-line1 { width: 120px; }
        .signature-line2, .signature-line3 { width: 60px; }
        @media print { @page { size: A4; margin: 1cm; } .plan-frame, .signature-section { break-inside: avoid; } }
    </style>
</head>
<body>
<div class="plan-container">
    <div class="plan-heading">...</div>
    <div class="plan-frame">
        <div class="door-marker {{ door_class }}">🚪<span>DOOR</span></div>
        <div class="invigilator">Invigilator's Table</div>
        <table class="desk-table">
            {% for r in range(rows) %}
            <tr>
                {% for c in range(columns) %}
                    {% set val = matrix[r][c] %}
                    <td class="{% if not val %}empty{% endif %}">{{ val if val else '' }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </table>
    </div>
    <div class="signature-section">...</div>
</div>
</body>
</html>
