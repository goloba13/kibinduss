{% extends "base2.html" %}

{% block title %}Change Password | KIBINDU{% endblock %}

{% block extra_css %}
<style>
    /* Ukurasa mzima unapata background ya rangi ya mfumo */
    .change-password-container {
        max-width: 500px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    /* Kadi ya kisasa */
    .card-modern {
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05), 0 4px 10px rgba(0,0,0,0.02);
        padding: 2rem 1.5rem;
        transition: transform 0.2s;
    }

    .card-modern h2 {
        font-size: 1.8rem;
        font-weight: 600;
        color: #2c3e50;
        margin-bottom: 0.5rem;
    }

    .card-modern .subtitle {
        color: #6c757d;
        text-align: center;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
    }

    /* Input groups */
    .input-group-modern {
        margin-bottom: 1.2rem;
        position: relative;
    }

    .input-group-modern label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 500;
        margin-bottom: 6px;
        color: #2c3e50;
    }

    .input-group-modern label i {
        color: #28a745;
        width: 20px;
    }

    .input-group-modern input {
        width: 100%;
        padding: 12px 40px 12px 15px;
        border: 1px solid #dee2e6;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.2s;
        background: #f8f9fa;
    }

    .input-group-modern input:focus {
        outline: none;
        border-color: #28a745;
        box-shadow: 0 0 0 3px rgba(40,167,69,0.1);
        background: white;
    }

    /* Ikon ya jicho */
    .password-toggle {
        position: absolute;
        right: 15px;
        bottom: 12px;
        cursor: pointer;
        color: #6c757d;
        font-size: 1.1rem;
        transition: color 0.2s;
    }

    .password-toggle:hover {
        color: #28a745;
    }

    /* Kitufe */
    .btn-modern {
        background: #28a745;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 40px;
        font-weight: 600;
        font-size: 1rem;
        width: 100%;
        cursor: pointer;
        transition: background 0.2s, transform 0.1s;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        margin-top: 0.5rem;
    }

    .btn-modern:hover {
        background: #218838;
        transform: translateY(-1px);
    }

    .btn-modern:active {
        transform: translateY(1px);
    }

    /* Alert ya kosa */
    .alert-error {
        background: #f8d7da;
        color: #721c24;
        border-left: 4px solid #dc3545;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.9rem;
    }

    .alert-error i {
        font-size: 1.2rem;
    }

    /* Uitikaji */
    @media (max-width: 576px) {
        .card-modern {
            padding: 1.5rem;
        }
        .card-modern h2 {
            font-size: 1.5rem;
        }
    }
</style>
{% endblock %}

{% block content %}
<div class="change-password-container">
    <div class="card-modern">
        <h2 class="text-center">Change Password</h2>
        <div class="subtitle text-center">Tafadhali ingiza taarifa zako</div>

        {% if error %}
        <div class="alert-error">
            <i class="fas fa-exclamation-triangle"></i>
            <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="post" action="{{ url_for('change_password') }}">
            <!-- Username -->
            <div class="input-group-modern">
                <label><i class="fas fa-user"></i> Username</label>
                <input type="text" name="username" value="{{ request.form.username or '' }}" required autofocus>
            </div>

            <!-- Current password -->
            <div class="input-group-modern">
                <label><i class="fas fa-key"></i> Current password</label>
                <input type="password" name="current_password" id="current_password" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('current_password', this)"></i>
            </div>

            <!-- New password -->
            <div class="input-group-modern">
                <label><i class="fas fa-lock"></i> New password</label>
                <input type="password" name="new_password" id="new_password" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('new_password', this)"></i>
            </div>

            <!-- Confirm password -->
            <div class="input-group-modern">
                <label><i class="fas fa-check-circle"></i> Confirm new password</label>
                <input type="password" name="confirm_password" id="confirm_password" required>
                <i class="fas fa-eye password-toggle" onclick="togglePassword('confirm_password', this)"></i>
            </div>

            <button type="submit" class="btn-modern">
                <i class="fas fa-save"></i> Save Changes
            </button>
        </form>
    </div>
</div>

<script>
    function togglePassword(fieldId, iconElement) {
        var input = document.getElementById(fieldId);
        if (input.type === 'password') {
            input.type = 'text';
            iconElement.classList.remove('fa-eye');
            iconElement.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            iconElement.classList.remove('fa-eye-slash');
            iconElement.classList.add('fa-eye');
        }
    }
</script>
{% endblock %}
