<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tuma Faili - KIBINDU</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 0;
        }
        .main-content {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 1rem;
        }
        .form-container, .files-container {
            max-width: 800px;
            margin: 1rem auto;
            background: white;
            padding: 1.5rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2, h3 {
            color: #1e4a3d;
            border-left: 5px solid #1e4a3d;
            padding-left: 1rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        label {
            font-weight: 600;
            color: #1e4a3d;
            display: block;
            margin-bottom: 0.4rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid #ced4da;
            border-radius: 12px;
            font-size: 0.95rem;
        }
        button {
            background: #1e4a3d;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:hover {
            background: #0f2c23;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
            vertical-align: middle;
        }
        th {
            background: #e9ecef;
        }
        .alert {
            padding: 0.8rem;
            border-radius: 12px;
            margin-bottom: 1rem;
        }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-danger { background: #f8d7da; color: #721c24; }
        .btn-sm {
            padding: 0.25rem 0.8rem;
            font-size: 0.75rem;
            border-radius: 30px;
            background-color: #17a2b8;
            color: white;
            text-decoration: none;
            display: inline-block;
        }
        .btn-sm:hover {
            background-color: #138496;
        }
        .text-center { text-align: center; }
        .text-muted { color: #6c757d; }
    </style>
</head>
<body>
   

    <div class="main-content">
        <div class="form-container">
            <h2>📤 Tuma Faili</h2>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="post" enctype="multipart/form-data" action="{{ url_for('send_file_page') }}">
                <div class="form-group">
                    <label>Mtumiaji anayepokea *</label>
                    <select name="recipient" id="recipientSelect" required>
                        <option value="">-- Chagua mtumiaji --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Sababu / Kazi ya faili *</label>
                    <input type="text" name="use_for" required placeholder="e.g., Ripoti ya Mwalimu wa Zamu">
                </div>
                <div class="form-group">
                    <label>Faili (Excel, PDF, DOCX, CSV) *</label>
                    <input type="file" name="file" accept=".xlsx,.xls,.pdf,.docx,.csv" required>
                </div>
                <button type="submit">🚀 Tuma Faili</button>
            </form>
        </div>

        <div class="files-container">
            <h3>📂 Recent Files sent</h3>
            <div id="filesList">
                <div class="text-center">Inapakia...</div>
            </div>
        </div>
    </div>

    <script>
        // Load recipients list
        async function loadRecipients() {
            try {
                const res = await fetch('/api/users-list');
                const users = await res.json();
                const select = document.getElementById('recipientSelect');
                if (users.error) return;
                users.forEach(user => {
                    const option = document.createElement('option');
                    option.value = user.username;
                    option.textContent = `${user.username} (${user.role})`;
                    select.appendChild(option);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Load my files
        async function loadMyFiles() {
            const container = document.getElementById('filesList');
            try {
                const res = await fetch('/my-files');
                const files = await res.json();
                if (files.error) throw new Error(files.error);
                if (files.length === 0) {
                    container.innerHTML = '<p class="text-muted">Hakuna faili katika muda wa miezi 3 iliyopita.</p>';
                    return;
                }
                let html = `<div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr><th>Sender</th><th>Recieved by</th><th>File For</th><th>Date</th><th>Action</th></tr>
                        </thead>
                        <tbody>`;
                files.forEach(f => {
                    const sentDate = new Date(f.sent_at).toLocaleString();
                    html += `<tr>
                        <td>${escapeHtml(f.sender)}</td>
                        <td>${escapeHtml(f.recipient)}</td>
                        <td>${escapeHtml(f.use_for)}</td>
                        <td>${sentDate}</td>
                        <td><a href="${escapeHtml(f.file_url)}" target="_blank" class="btn-sm">Download</a></td>
                    </tr>`;
                });
                html += `</tbody></table></div>`;
                container.innerHTML = html;
            } catch (err) {
                container.innerHTML = '<div class="alert alert-danger">Imeshindwa kupakia faili.</div>';
                console.error(err);
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : (m === '<' ? '&lt;' : '&gt;'));
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadRecipients();
            loadMyFiles();
        });
    </script>
</body>
</html>
