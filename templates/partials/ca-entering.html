<!-- Content Header (keyboard toggle) -->
<div class="keyboard-toggle">
    <label>
        <input type="checkbox" id="toggleKeyboard"> ON / OFF
    </label>
</div>

<div id="floatingKeyboard" style="display:none;">
    <div class="keyboard-buttons">
        <button class="key">1</button>
        <button class="key">2</button>
        <button class="key">3</button>
        <button class="key">4</button>
        <button class="key">5</button>
        <button class="key">6</button>
        <button class="key">7</button>
        <button class="key">8</button>
        <button class="key">9</button>
        <button class="key">.</button>
        <button class="key">0</button>
        <button class="key back">⌫</button>
        <button class="key ok">OK</button>
        <button class="key focus-back" style="background:#f39c12; color:white;">◀︎</button>
    </div>
</div>

<div class="content-header">
    {{ html_head | safe }}
</div>

<div class="container-fluid">
    <!-- Fomu ya kuchagua kidato na somo -->
    <div class="row mb-3">
        <div class="col-md-4">
            <label for="formSelect">Kidato</label>
            <select id="formSelect" class="form-select">
                {% for f in forms %}
                <option value="{{ f }}" {% if f == selected_form %}selected{% endif %}>
                    {{ f|capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4">
            <label for="subjectSelect">Somo</label>
            <select id="subjectSelect" class="form-select">
                {% for s in subjects %}
                <option value="{{ s }}" {% if s == selected_subject %}selected{% endif %}>
                    {{ s|capitalize }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="col-md-4 d-flex align-items-end">
            <button id="refreshBtn" class="btn btn-primary">Onyesha Alama</button>
        </div>
    </div>

    <!-- Jedwali la alama -->
    <table class="table table-bordered" id="marksTable">
        <thead>
            <tr>
                <th>#</th>
                <th>Name</th>
                <th>Sex</th>
                <th>Marks</th>
            </tr>
        </thead>
        <tbody id="marksBody">
            {% if rows %}
                {% for row in rows %}
                <tr>
                    <td>{{ loop.index }}</td>
                    <td>{{ row.student_name }}</td>
                    <td>{{ row.sex or '' }}</td>
                    <td>
                        <input type="number" class="mark-input" style="width:70px;"
                               value="{{ row.marks if row.marks is not none else '' }}"
                               min="0" max="100" step="1">
                        <small class="error-text"></small>
                    </td>
                </tr>
                {% endfor %}
            {% else %}
                <tr>
                    <td colspan="4" class="text-center text-muted">
                        Hakuna data. Tafadhali chagua kidato na somo.
                    </td>
                </tr>
            {% endif %}
        </tbody>
    </table>

    <!-- marks_menu -->
    <div class="marks_menu">
        <button id="marks_menuBtn">Complete</button>
        <div id="marks_dropdownMenu">
            <a href="#" id="saveMarks">Save marks</a>
            <a href="#" id="createFile">Create file</a>
            <a href="#" id="analyseMarks">Analyse marks</a>
        </div>
    </div>
</div>

<script>
    // Kazi ya kupakia upya partial baada ya kubadilisha vigezo
    function loadFilteredMarks() {
        const form = document.getElementById('formSelect').value;
        const subject = document.getElementById('subjectSelect').value;
        const url = `/partials/ca-marks?form=${encodeURIComponent(form)}&subject=${encodeURIComponent(subject)}`;
        fetch(url)
            .then(res => res.text())
            .then(html => {
                // Badilisha maudhui ya partial nzima
                const container = document.getElementById('main-content');
                if (container) container.innerHTML = html;
            })
            .catch(err => console.error('Error loading marks:', err));
    }

    // Sajili event listeners kwa dropdowns na kitufe cha refresh
    document.getElementById('refreshBtn').addEventListener('click', loadFilteredMarks);
    document.getElementById('formSelect').addEventListener('change', loadFilteredMarks);
    document.getElementById('subjectSelect').addEventListener('change', loadFilteredMarks);

    // ---------------------------
    // Usimamizi wa keyboard ya kuelea (floating keyboard)
    const toggle = document.getElementById('toggleKeyboard');
    const keyboard = document.getElementById('floatingKeyboard');
    let activeInput = null;

    toggle.addEventListener('change', function() {
        keyboard.style.display = this.checked ? 'block' : 'none';
    });

    // Kugundua input iliyofocus
    document.addEventListener('focusin', function(e) {
        if (e.target.classList.contains('mark-input')) {
            activeInput = e.target;
            activeInput.select();
        }
    });

    // Kuchakata vibonye vya keyboard
    keyboard.addEventListener('click', function(e) {
        const key = e.target.closest('.key');
        if (!key || !activeInput) return;
        const value = key.innerText.trim();
        if (key.classList.contains('ok')) {
            // OK: hakikisha alama ni sahihi, kisha ruka kwenye input inayofuata
            const inputs = Array.from(document.querySelectorAll('.mark-input'));
            const idx = inputs.indexOf(activeInput);
            if (idx !== -1 && idx + 1 < inputs.length) inputs[idx + 1].focus();
        } else if (key.classList.contains('back')) {
            activeInput.value = activeInput.value.slice(0, -1);
        } else if (key.classList.contains('focus-back')) {
            const inputs = Array.from(document.querySelectorAll('.mark-input'));
            const idx = inputs.indexOf(activeInput);
            if (idx > 0) inputs[idx - 1].focus();
        } else {
            // namba au nukta
            if (value === '.' && activeInput.value.includes('.')) return;
            activeInput.value += value;
            // auto-next kama imekamilika (mfano namba 2 au 100)
            const val = activeInput.value.trim();
            if ((/^\d{2}$/.test(val) && Number(val) < 100) || val === '100') {
                const inputs = Array.from(document.querySelectorAll('.mark-input'));
                const idx = inputs.indexOf(activeInput);
                if (idx !== -1 && idx + 1 < inputs.length) inputs[idx + 1].focus();
            }
        }
    });

    // Validation ya mark-input (0-100)
    document.addEventListener('input', function(e) {
        const input = e.target;
        if (!input.classList.contains('mark-input')) return;
        const value = parseInt(input.value);
        const errorSpan = input.nextElementSibling;
        if (isNaN(value) || value < 0 || value > 100) {
            errorSpan.textContent = 'Alama lazima iwe 0-100';
            input.style.borderColor = '#e74c3c';
        } else {
            errorSpan.textContent = '';
            input.style.borderColor = '#2ecc71';
        }
    });

    // Navigation kwa keyboard (Enter, Arrow keys)
    document.addEventListener('keydown', function(e) {
        const active = document.activeElement;
        if (!active.classList || !active.classList.contains('mark-input')) return;
        const inputs = Array.from(document.querySelectorAll('.mark-input'));
        const idx = inputs.indexOf(active);
        if (e.key === 'Enter' || e.key === 'ArrowDown') {
            e.preventDefault();
            if (idx + 1 < inputs.length) inputs[idx + 1].focus();
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (idx > 0) inputs[idx - 1].focus();
        }
    });

    // ---------------------------
    // Usimamizi wa marks_menu (dropdown)
    const menuBtn = document.getElementById('marks_menuBtn');
    const dropdownMenu = document.getElementById('marks_dropdownMenu');
    if (menuBtn && dropdownMenu) {
        menuBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdownMenu.classList.toggle('show');
        });
        // Funga menu ukibofya nje
        document.addEventListener('click', function(e) {
            if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                dropdownMenu.classList.remove('show');
            }
        });
        // Vitendo vya menu (kwa sasa tu console, unaweza kuongeza ajax)
        document.getElementById('saveMarks').addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Save marks clicked');
            // TODO: kusanya alama na utume kwa server
        });
        document.getElementById('createFile').addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Create file clicked');
            // TODO: tumia fomu ya kuunda Excel (kama ilivyo katika njia ya server-side)
        });
        document.getElementById('analyseMarks').addEventListener('click', function(e) {
            e.preventDefault();
            console.log('Analyse marks clicked');
        });
    }
</script>
