<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Ukurasa Haupatikani | KIBINDU</title>
    <!-- Font Awesome 6 (kwa icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .error-card {
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.15);
            max-width: 550px;
            width: 100%;
            padding: 2.5rem 2rem;
            text-align: center;
            transition: transform 0.2s;
        }

        .error-card:hover {
            transform: scale(1.02);
        }

        .icon-circle {
            background: #fff3e0;
            width: 90px;
            height: 90px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
        }

        .icon-circle i {
            font-size: 3.5rem;
            color: #e67e22;
        }

        h1 {
            font-size: 5rem;
            font-weight: 800;
            color: #1e4a3d;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        h2 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .message {
            color: #5a6e7c;
            font-size: 1rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .btn-dashboard {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1e4a3d;
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.8rem;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
            font-size: 1rem;
        }

        .btn-dashboard:hover {
            background: #0f2c23;
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(30,74,61,0.3);
        }

        .footer-note {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #8899aa;
        }

        @media (max-width: 550px) {
            .error-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 3.5rem;
            }
            h2 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-circle">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        <h1>404</h1>
        <h2>Ukurasa Haupatikani</h2>
        <p class="message">
            Samahani, ukurasa unaotafuta haupo au umehamishwa.<br>
            Tafadhali angalia URL au rudi kwenye mwanzo.
        </p>
        <a href="/" class="btn-dashboard">
            <i class="fas fa-home"></i> Rudi/Back
        </a>
        <div class="footer-note">
            <i class="fas fa-shield-alt"></i> KIBINDU SECONDARY SCHOOL
        </div>
    </div>
</body>
</html>
