{% extends "base.html" %}
{% block content %}
<style>
/* ========== STYLE ZA UKURASA WA MATOKEO (mbadala.html) ========== */
.container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1rem;
}

h2 {
    color: #1e4a3d;
    font-weight: 700;
    margin-bottom: 1.5rem;
    border-left: 5px solid #1e4a3d;
    padding-left: 1rem;
}

/* Dropdown styling */
.form-select {
    border: 1px solid #ced4da;
    border-radius: 12px;
    padding: 0.5rem 1rem;
    background-color: white;
    font-size: 1rem;
    transition: 0.2s;
    width: auto;
    min-width: 200px;
}
.form-select:focus {
    border-color: #1e4a3d;
    box-shadow: 0 0 0 3px rgba(4, 12, 10, 0.721);
    outline: none;
}

/* Jedwali */
.table-responsive {
    overflow-x: auto;
    margin-top: 1.5rem;
    border-radius: 16px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.751);
}

.table {
    width: 100%;
    border-collapse: collapse;
    background-color: white;
    font-size: 0.9rem;
}

.table thead th {
    background: linear-gradient(135deg, #1e4a3d, #0f2c23);
    color: white;
    padding: 0.9rem 1rem;
    text-align: left;
    font-weight: 700;
    border-bottom: 2px solid #2c6e5c;
}

.table tbody td {
    padding: 0.75rem 1rem;
    border-bottom: 1px solid #e2e8f0;
    color: #1a2c2e;
    vertical-align: middle;
}

.table tbody tr:nth-child(even) {
    background-color: #f8fafc;
}

.table tbody tr:hover {
    background-color: #eef2f5;
    transition: background 0.2s ease;
}

/* Safu ya masomo (out_subjects_marks_grades) - ruhusu kuvunjika kwa maneno */
.table tbody td:nth-child(3) {
    word-break: break-word;
    white-space: normal;
    max-width: 400px;
}

/* Alama za pointi na division - katikati */
.table tbody td:nth-child(4),
.table tbody td:nth-child(5) {
    text-align: center;
    font-weight: 500;
}

/* Nafasi ya dropdown */
.mb-4 {
    margin-bottom: 1.5rem;
}

/* Urahisi kwenye simu */
@media (max-width: 768px) {
    .table thead th,
    .table tbody td {
        padding: 0.5rem 0.6rem;
        font-size: 0.75rem;
    }
    .table tbody td:nth-child(3) {
        max-width: 200px;
    }
    h2 {
        font-size: 1.4rem;
    }
    .form-select {
        font-size: 0.85rem;
        padding: 0.4rem 0.8rem;
    }
}

/* Ikiwa una spinner au ujumbe wa hakuna data */
.alert {
    border-radius: 12px;
    padding: 0.8rem 1rem;
}
</style>
<div class="container mt-4">
    <h2>Matokeo ya Wanafunzi</h2>
    <form method="get" class="mb-4">
        <select name="exam_id" onchange="this.form.submit()" class="form-select w-auto">
            {% for exam in exam_types %}
            <option value="{{ exam.id }}" {% if exam.id == selected_exam_id %}selected{% endif %}>
                {{ exam.exam_name }}
            </option>
            {% endfor %}
        </select>
    </form>
    <div class="table-responsive">
        <table class="table table-bordered table-striped">
            <thead class="table-success">
                <tr>
                    <th>Namba</th> 
                    <th>Form</th>                   
                    <th>Marks</th>
                    <th>Points</th>
                    <th>Division</th>
                </tr>
            </thead>
            <tbody>
                {% for row in results %}
                <tr>
                    <td>{{ row.student_id }}</td>
                    <td>{{ row.out_class }}</td>
                    <td>{{ row.out_subjects_marks_grades }}</td>
                    <td>{{ row.total_points }}</td>
                    <td>{{ row.division }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
