<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <title>Simamia Masomo na Walimu</title>
    <style>
        h2 { font-size: medium;}
        body { font-family: Arial; margin: 20px; background: #e7e6e6; }
        .container { max-width: 100%; margin: auto; background: white; padding: 20px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background: #f2f2f2; }
        button { background: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:disabled { background: #aaa; }
        .message { padding: 10px; margin: 10px 0; border-radius: 4px; display: none; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { text-align: center; padding: 20px; }
    </style>
</head>
<body>
<div class="container">
    <h2>SUBJECTS & SUBJECT TEACHERS</h2>
    <button id="syncBtn">Sync data</button>
    <div id="message" class="message"></div>
    <div id="tableContainer"><div class="loading">Inapakia data...</div></div>
</div>

<script>
    const API_BASE = ''; // acha tupu ikiwa routes ziko kwenye server moja

    async function fetchSubjects() {
        const container = document.getElementById('tableContainer');
        container.innerHTML = '<div class="loading">Inapakia...</div>';
        try {
            const res = await fetch(`${API_BASE}/subjects`);
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            displaySubjects(data);
        } catch (err) {
            container.innerHTML = `<div class="error">❌ Kosa: ${err.message}</div>`;
        }
    }

function displaySubjects(subjects) {
    const container = document.getElementById('tableContainer');
    
    // Hakikisha subjects ni array
    if (!subjects || !Array.isArray(subjects) || subjects.length === 0) {
        container.innerHTML = '<p>Hakuna data ya masomo.</p>';
        return;
    }

    // Anza kuunda jedwali
    let html = `
        <table border="1" style="border-collapse: collapse; width: 100%; margin-top: 15px;">
            <thead>
                <tr style="background-color: #f2f2f2;">
                    <th>ID</th>
                    <th>Jina la Somo</th>
                    <th>Mwalimu Form 1</th>
                    <th>Mwalimu Form 2</th>
                    <th>Mwalimu Form 3</th>
                    <th>Mwalimu Form 4</th>
                </tr>
            </thead>
            <tbody>
    `;

    // Loop kupitia kila somo
    subjects.forEach(subj => {
        html += `
            <tr>
                <td>${subj.id || ''}</td>
                <td>${escapeHtml(subj.subject_name) || ''}</td>
                <td>${escapeHtml(subj.form1) || '—'}</td>
                <td>${escapeHtml(subj.form2) || '—'}</td>
                <td>${escapeHtml(subj.form3) || '—'}</td>
                <td>${escapeHtml(subj.form4) || '—'}</td>
            </tr>
        `;
    });

    html += `
            </tbody>
        </table>
    `;

    container.innerHTML = html;
}
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    async function syncTeachers() {
        const btn = document.getElementById('syncBtn');
        const msgDiv = document.getElementById('message');
        btn.disabled = true;
        msgDiv.style.display = 'block';
        msgDiv.className = 'message';
        msgDiv.textContent = 'Inasawazisha...';

        try {
            const res = await fetch(`${API_BASE}/sync-teachers`, { method: 'POST' });
            const text = await res.text();
            let result;
            try {
                result = JSON.parse(text);
            } catch(e) {
                throw new Error(`Server imerudisha: ${text.substring(0, 100)}`);
            }
            if (!res.ok) throw new Error(result.error || 'Hitilafu');
            msgDiv.className = 'message success';
            msgDiv.textContent = '✅ Imefanikiwa! Data imesasishwa.';
            await fetchSubjects(); // Onyesha mabadiliko
        } catch (err) {
            msgDiv.className = 'message error';
            msgDiv.textContent = '❌ ' + err.message;
        } finally {
            btn.disabled = false;
            setTimeout(() => msgDiv.style.display = 'none', 5000);
        }
    }

    window.addEventListener('DOMContentLoaded', () => {
        fetchSubjects();
        document.getElementById('syncBtn').addEventListener('click', syncTeachers);
    });
</script>
</body>
</html>
