{% extends "base2.html" %}
{% block title %}Angalia Ripoti - {{ report_date }}{% endblock %}
{% block content %}
<div class="container mt-4">
    <h2>Ripoti ya Mwalimu wa Zamu - {{ report_date }}</h2>
    <div class="alert alert-info">
        PDF inaonyeshwa hapa chini. Unaweza kuisoma au kuichapisha.
    </div>
    <div class="card">
        <div class="card-body p-0">
            <iframe src="{{ pdf_url }}" style="width: 100%; height: 80vh; border: none;"></iframe>
        </div>
    </div>
    <div class="mt-3">
        <a href="{{ url_for('duty_rotation') }}" class="btn btn-secondary">Rudi kwenye Zamu</a>
    </div>
</div>
{% endblock %}
