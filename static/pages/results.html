<script>
document.addEventListener('DOMContentLoaded', function() {
    var cbs = document.querySelectorAll('.subject-cb');
    var selectAll = document.getElementById('select-all-subjects');
    var deselectAll = document.getElementById('deselect-all-subjects');

    }
});
